<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Heritage Snacks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div id="logo-overlay">
        <img src="assets/brand-logo.png" alt="Brand Logo" id="main-logo">
    </div>

    <div id="canvas-container"></div>

    <main class="scroll-container">
        <section class="hero-spacer"></section>
        
        <section id="products" class="product-reveal">
            <h1 class="section-title">The Royal Collection</h1>
            <div class="product-grid">
                <div class="card">Traditional Bhujia</div>
                <div class="card">Saffron Delights</div>
                <div class="card">Premium Cashews</div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
